{% extends 'membros/base.html' %}

{% block title %}Remover Membro{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold text-red-600 mb-6">Remover Membro</h1>
<p class="text-gray-700 mb-6">Tem certeza que deseja remover <b>{{ membro.nome }}</b>?</p>
<form method="post" class="flex gap-3">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700">Sim, remover</button>
    <a href="{% url 'listar_membros' %}" class="bg-gray-300 text-gray-700 px-6 py-2 rounded hover:bg-gray-400">Cancelar</a>
</form>
{% endblock %}
