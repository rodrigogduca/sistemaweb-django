<!DOCTYPE html>
<html>
<head>
    <title>Remover Membro</title>
</head>
<body>
    <h1>Remover Membro</h1>
    <p>Tem certeza que deseja remover {{ membro.nome }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sim, remover</button>
        <a href="{% url 'listar_membros' %}">Cancelar</a>
    </form>
</body>
</html>
