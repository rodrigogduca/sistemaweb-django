<!--
login.html - Template da tela de login do sistema.

Este arquivo HTML é o formulário de login. Ele NÃO herda de base.html
porque a tela de login tem um layout diferente (centralizado, sem navbar).

Conceitos usados:
- {% csrf_token %}: proteção contra ataques CSRF (Cross-Site Request Forgery).
  O Django gera um token secreto no formulário que é verificado no servidor.
  Sem isso, o Django rejeita o POST com erro 403.

- {% if erro %}: template tag condicional do Django.
  A variável 'erro' é passada pela LoginView quando a autenticação falha.

- method="post": o formulário envia os dados via HTTP POST (não aparece na URL).
  O Django recebe os dados em request.POST na view.

- name="username" / name="password": o atributo 'name' define a chave usada
  para acessar o valor na view (request.POST.get('username')).
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Login</h1>

        {% if erro %}
        <div class="bg-red-100 text-red-700 px-4 py-2 rounded mb-4 text-sm">
            {{ erro }}
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                <input type="text" name="username" id="username" required
                       class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" name="password" id="password" required
                       class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">
                Entrar
            </button>
        </form>
    </div>
</body>
</html>
