{% extends 'sistemaweb/base.html' %}

{% block title %}Cadastrar Membro{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold text-gray-800 mb-6">Cadastrar Membro</h1>

{% if erro %}
<div class="bg-red-100 text-red-700 px-4 py-2 rounded mb-4 text-sm">
    {{ erro }}
</div>
{% endif %}

<form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
        <label for="nome" class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
        <input type="text" name="nome" id="nome" value="{{ nome|default:'' }}" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" id="email" value="{{ email|default:'' }}" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Nome de Usuario</label>
        <input type="text" name="username" id="username" value="{{ username|default:'' }}" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input type="password" name="password" id="password" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div class="flex gap-3">
        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700">Salvar</button>
        <a href="{% url 'listar_membros' %}" class="bg-gray-300 text-gray-700 px-6 py-2 rounded hover:bg-gray-400">Voltar</a>
    </div>
</form>
{% endblock %}
